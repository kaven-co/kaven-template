steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - Dockerfile.api
      - -t
      - us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/kaven-api:latest
      - .
images:
  - us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/kaven-api:latest
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
