      description: "Admin routes authorization patterns"

  validation:
    - type: E2E_TEST
      tool: Playwright
      coverage: "Invoice page, Order page, Theme customization"

    - type: VISUAL_REGRESSION
      tool: Percy (optional)
      coverage: "Invoice/Order pages em diferentes themes"

    - type: DEMO_RECORDING
      tool: Loom
      content: "Complete customer journey (signup → use → billing)"

  rollback_plan: |
    Se algo crítico falhar durante Sprint 2:

    1. **Rollback Migrations (TenantBranding):**
       - Revert schema changes via Prisma
       - Restaurar DesignSystemCustomization table

    2. **Rollback Frontend:**
       - Remove Invoice/Order routes (delete pages/)
       - Revert ThemeProvider changes

    3. **Feature Flags (if deployed):**
       - Disable Invoice/Order pages via feature flag
       - Revert to old theme provider

    **Backup Strategy:**
    - Database snapshot antes de TenantBranding migration
    - Frontend build tagged por story ID
    - Vercel deployment com rollback instant

  status: NOT_STARTED
