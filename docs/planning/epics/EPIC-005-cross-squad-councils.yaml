notes: |
  Este epic estabelece o padrão de integração cross-squad que pode ser replicado
  para futuros squads. A estrutura de task + workflow + agent wiring + E2E é
  template para qualquer nova integração.

  Steave é o primeiro agente "meta" do kaven-squad - ele não implementa código,
  mas orquestra outros agentes e traz strategic thinking ao squad. Isso abre
  precedente para outros agentes meta no futuro (e.g., product manager agent,
  design lead agent).

  Os 5 councils cobrem as 5 áreas críticas de decisão em SaaS development:
  1. Design (UX/UI) - já existente
  2. Architecture (technical decisions)
  3. Product (discovery, strategy, validation)
  4. Growth (marketing, positioning, GTM)
  5. Quality (testing strategy, risk analysis)
