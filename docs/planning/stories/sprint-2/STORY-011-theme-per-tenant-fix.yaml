story:
  id: STORY-011
  epic_id: EPIC-002
  title: "Theme Per-Tenant Architecture Fix"
  description: |
    Corrigir arquitetura de theme: atualmente o tema é armazenado por usuário (per-user),
    mas o correto para um sistema multi-tenant é per-tenant (todos usuários de um tenant
    veem o mesmo tema customizado).

    P0: Sem essa correção, white-labeling não funciona corretamente. O tenant owner
    customiza o tema mas outros membros do tenant veem o tema padrão.

  priority: P0
  effort_hours: 8
  status: COMPLETED
  assignee_role: Backend Engineer
  sprint: Sprint 2
  dependencies: [STORY-010]
  epic_id: EPIC-002

  acceptance_criteria:
    - [ ] Schema: PlatformConfig tem tenantId (não userId)
      - [ ] PlatformConfig.tenantId NOT NULL
      - [ ] Remover PlatformConfig.userId se existir
      - [ ] Migration SQL gerada e válida

    - [ ] API: busca PlatformConfig por tenantId
      - [ ] GET /api/settings/platform usa tenantId do contexto RLS
      - [ ] Não retorna config de outro tenant

    - [ ] Frontend: todos usuários do tenant veem o mesmo tema
      - [ ] layout.tsx carrega theme por tenantId
      - [ ] Tenant owner e membros veem o mesmo tema

    - [ ] Migration sem perda de dados
      - [ ] Script de migração mantém dados existentes
      - [ ] Teste de rollback

  technical_notes: |
    - Verificar se PlatformConfig já tem tenantId ou é per-user
    - Se per-user: criar migration para adicionar tenantId, remover userId
    - RLS middleware (STORY-005) já lida com tenantId no contexto
    - Cuidado com migration em dados existentes

  files_to_modify:
    - packages/database/prisma/schema.base.prisma
    - packages/database/prisma/migrations/
    - apps/api/src/modules/settings/

  definition_of_done:
    - [ ] PlatformConfig por tenant, não por usuário
    - [ ] Migration funciona em dados existentes
    - [ ] Todos usuários do tenant veem mesmo tema
    - [ ] Zero TypeScript errors
