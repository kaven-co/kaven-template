    **API Endpoints to Implement:**

    ```typescript
    // apps/api/src/routes/gdpr.routes.ts

    router.get('/users/:id/export', async (req, res) => {
      const { id } = req.params;
      const { format = 'json' } = req.query;

      // Authorization check
      if (req.user.id !== id && !req.user.isAdmin) {
        return res.status(403).json({ error: 'Forbidden' });
      }

      const userData = await gdprService.exportUserData(id);

      switch (format) {
        case 'csv':
          return res.type('text/csv').send(convertToCSV(userData));
        case 'xml':
          return res.type('application/xml').send(convertToXML(userData));
        default:
          return res.json(userData);
      }
    });

    router.delete('/users/:id/gdpr-erase', async (req, res) => {
      const { id } = req.params;

      // Authorization check
      if (req.user.id !== id) {
        return res.status(403).json({ error: 'Forbidden' });
      }

      // Send confirmation email (double opt-in)
      await emailService.sendGDPRErasureConfirmation(req.user.email);

      // Queue async job
      await jobQueue.add('gdpr-erase', { userId: id });

      return res.status(202).json({
        message: 'Erasure request accepted',
        job_id: `gdpr-erase-${id}`
      });
    });

    router.post('/users/:id/consent', async (req, res) => {
      const { id } = req.params;
      const { type, granted, policy_version } = req.body;

      const consent = await prisma.userConsent.create({
        data: {
          userId: id,
          type,
          granted,
          policy_version,
          granted_at: new Date(),
          ip_address: req.ip,
        }
      });

      return res.status(201).json(consent);
    });
    ```

    **Background Job for Data Retention:**

    ```typescript
    // apps/api/src/jobs/gdpr-cleanup.job.ts

    export async function cleanupInactiveUsers() {
      const twoYearsAgo = new Date();
      twoYearsAgo.setFullYear(twoYearsAgo.getFullYear() - 2);

      const inactiveUsers = await prisma.user.findMany({
        where: {
          last_login_at: { lt: twoYearsAgo },
          gdpr_delete_requested: true,
        }
      });

      for (const user of inactiveUsers) {
        await gdprService.eraseUserData(user.id);
        logger.info(`GDPR cleanup: Erased user ${user.id}`);
      }

      return { deleted_count: inactiveUsers.length };
    }
    ```

    **CI Integration:**

    Adicionar script em package.json:
    ```json
    {
      "scripts": {
        "test:gdpr": "jest apps/api/tests/compliance --coverage --coverageDirectory=coverage/gdpr"
      }
    }
    ```

    Adicionar step no GitHub Actions:
    ```yaml
    - name: Run GDPR Compliance Tests
      run: pnpm run test:gdpr

    - name: Check GDPR Coverage
      run: |
        if [ $(jq '.total.lines.pct < 100' coverage/gdpr/coverage-summary.json) ]; then
          echo "GDPR test coverage < 100%"
          exit 1
        fi
    ```

