    **Test Data Setup:**

    Criar fixtures para security tests:
    ```typescript
    // apps/api/tests/fixtures/security.fixtures.ts

    export async function createTenantIsolationTestData() {
      // Tenant A
      const tenantA = await prisma.tenant.create({
        data: { name: 'Tenant A', slug: 'tenant-a' }
      });
      const userA = await createUser({ tenantId: tenantA.id });
      const invoiceA = await createInvoice({ tenantId: tenantA.id });

      // Tenant B
      const tenantB = await prisma.tenant.create({
        data: { name: 'Tenant B', slug: 'tenant-b' }
      });
      const userB = await createUser({ tenantId: tenantB.id });
      const invoiceB = await createInvoice({ tenantId: tenantB.id });

      return { tenantA, userA, invoiceA, tenantB, userB, invoiceB };
    }
    ```

    **CI Integration:**

    Adicionar script em package.json:
    ```json
    {
      "scripts": {
        "test:security": "jest apps/api/tests/security --coverage --coverageDirectory=coverage/security"
      }
    }
    ```

    Adicionar step no GitHub Actions:
    ```yaml
    - name: Run Security Tests
      run: pnpm run test:security

    - name: Check Security Coverage
      run: |
        if [ $(jq '.total.lines.pct < 100' coverage/security/coverage-summary.json) ]; then
          echo "Security test coverage < 100%"
          exit 1
        fi
    ```

