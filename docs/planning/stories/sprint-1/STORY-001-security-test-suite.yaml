story:
  id: STORY-001
  epic_id: EPIC-001
  title: "Implement Security Test Suite (IDOR, CSRF, SQL Injection, XSS)"
  description: |
    Implementar suite completa de testes de segurança cobrindo 4 categorias críticas:
    IDOR (Insecure Direct Object Reference), CSRF (Cross-Site Request Forgery),
    SQL Injection, e XSS (Cross-Site Scripting).

    Este é o teste de segurança mais crítico do framework, garantindo que não há
    vulnerabilidades básicas que possam ser exploradas em produção.

  priority: P0
  effort_hours: 32
  assignee_role: QA Engineer (with Security Engineer support)
  dependencies: []
  debt_ids: [TEST-C1]

  acceptance_criteria:
    - [ ] IDOR Tests: 33 tenant-scoped models testados
      - [ ] Grant model (user de tenant A não acessa grant de tenant B)
      - [ ] GrantRequest model
      - [ ] Policy model
      - [ ] Capability model
      - [ ] SecurityAuditLog model
      - [ ] ImpersonationSession model
      - [ ] Invoice model
      - [ ] Order model
      - [ ] Payment model
      - [ ] Subscription model
      - [ ] Project model
      - [ ] Task model
      - [ ] Space model
      - [ ] ... (21 models restantes)

    - [ ] CSRF Tests: Todos POST/PUT/DELETE endpoints
      - [ ] POST /api/grants sem CSRF token → 403 Forbidden
      - [ ] POST /api/invoices sem CSRF token → 403 Forbidden
      - [ ] PUT /api/users/:id sem CSRF token → 403 Forbidden
      - [ ] DELETE /api/products/:id sem CSRF token → 403 Forbidden
      - [ ] Com CSRF token inválido → 403 Forbidden
      - [ ] Com CSRF token válido → 200/201 OK

    - [ ] SQL Injection Tests: Queries com user input
      - [ ] Search queries (GET /api/users?search=')
      - [ ] Filter queries (GET /api/invoices?status='; DROP TABLE invoices--)
      - [ ] Sort queries (GET /api/products?sort=name; DELETE FROM products--)
      - [ ] Todas as queries devem retornar erro 400 (não executar SQL malicioso)

    - [ ] XSS Tests: Inputs com <script> tags
      - [ ] User names com <script>alert('XSS')</script>
      - [ ] Invoice descriptions com <img src=x onerror=alert('XSS')>
      - [ ] Product titles com <svg onload=alert('XSS')>
      - [ ] Todos os inputs devem ser sanitizados (HTML entities escaped)

    - [ ] CI Integration: Tests rodam em pipeline
      - [ ] npm run test:security passa com 100% success
      - [ ] PR blockeado se security tests falharem
      - [ ] Coverage report gerado (security-coverage.json)

    - [ ] Documentation: Security patterns documentados
      - [ ] docs/testing/security.md criado
      - [ ] Examples de como escrever IDOR tests
      - [ ] Examples de como testar CSRF protection
      - [ ] Best practices de security testing

  technical_notes: |
    **Framework: Jest + Supertest**

    Criar helper functions reusáveis:

    ```typescript
    // apps/api/tests/helpers/security.helpers.ts

    export async function testIDOR(
      model: string,
      endpoint: string,
      tenantAUser: User,
      tenantBResourceId: string
    ) {
      const response = await request(app)
        .get(`${endpoint}/${tenantBResourceId}`)
        .set('Authorization', `Bearer ${tenantAUser.accessToken}`)
        .expect(403);

      expect(response.body.error).toContain('Forbidden');
    }

    export async function testCSRF(
      method: 'POST' | 'PUT' | 'DELETE',
      endpoint: string,
      data: any
    ) {
      // Test without CSRF token
      await request(app)
        [method.toLowerCase()](endpoint)
        .send(data)
        .expect(403);

      // Test with invalid CSRF token
      await request(app)
        [method.toLowerCase()](endpoint)
        .set('X-CSRF-Token', 'invalid-token')
        .send(data)
        .expect(403);

      // Test with valid CSRF token
      const csrfToken = await getCSRFToken();
      await request(app)
        [method.toLowerCase()](endpoint)
        .set('X-CSRF-Token', csrfToken)
        .send(data)
        .expect(200);
    }

    export async function testSQLInjection(
      endpoint: string,
      queryParam: string,
      injectionPayload: string
    ) {
      const response = await request(app)
        .get(endpoint)
        .query({ [queryParam]: injectionPayload })
        .expect(400);

      expect(response.body.error).toContain('Invalid input');
    }

    export async function testXSS(
      endpoint: string,
      data: Record<string, string>
    ) {
      const xssPayloads = [
        '<script>alert("XSS")</script>',
        '<img src=x onerror=alert("XSS")>',
        '<svg onload=alert("XSS")>',
      ];

      for (const payload of xssPayloads) {
        const response = await request(app)
          .post(endpoint)
          .send({ ...data, maliciousField: payload })
          .expect(201);

        // Verify response escapes HTML
        expect(response.body.maliciousField).not.toContain('<script>');
        expect(response.body.maliciousField).toContain('&lt;script&gt;');
      }
    }
    ```

