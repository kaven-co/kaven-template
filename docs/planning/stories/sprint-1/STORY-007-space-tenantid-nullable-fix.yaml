story:
  id: STORY-007
  epic_id: EPIC-001
  title: "Fix Space.tenantId Nullable (Make NOT NULL)"
  description: |
    Corrigir Space model onde tenantId é nullable, permitindo Spaces sem tenant.
    Isso viola isolamento multi-tenant fundamental.

    P0 LAUNCH BLOCKER: Space sem tenantId pode ser acessado por qualquer tenant.

  priority: P0
  effort_hours: 8
  assignee_role: Backend Engineer
  dependencies: [STORY-003]
  debt_ids: [MTN-C6]

  acceptance_criteria:
    - [ ] Schema Migration: Space.tenantId NOT NULL
      - [ ] ALTER TABLE spaces MODIFY tenant_id VARCHAR(191) NOT NULL
      - [ ] Backfill: assign orphaned spaces to default tenant ou delete

    - [ ] API Routes: Validate Space.tenantId
      - [ ] POST /api/spaces → auto-inject tenantId
      - [ ] PUT /api/spaces/:id → validate tenantId matches
      - [ ] GET /api/spaces → filter by tenantId

    - [ ] Tests: Space isolation
      - [ ] Tenant A não vê Spaces de Tenant B
      - [ ] Cannot create Space without tenantId

    - [ ] Documentation
      - [ ] docs/migrations/007-space-tenantid-not-null.md

  technical_notes: |
    **Migration:**
    ```sql
    -- Find orphaned spaces
    SELECT * FROM spaces WHERE tenant_id IS NULL;

    -- Assign to first tenant or delete
    UPDATE spaces SET tenant_id = (SELECT id FROM tenants LIMIT 1)
    WHERE tenant_id IS NULL;

    -- Make NOT NULL
    ALTER TABLE spaces MODIFY tenant_id VARCHAR(191) NOT NULL;
    ```

  files_to_modify:
    - packages/database/prisma/schema.prisma (UPDATE - remove ? from tenantId)
    - packages/database/prisma/migrations/XXX_space_tenantid_not_null.sql (CREATE)
    - apps/api/src/routes/spaces.routes.ts (UPDATE)
    - apps/api/tests/multi-tenant/space-isolation.spec.ts (CREATE)
    - docs/migrations/007-space-tenantid-not-null.md (CREATE)

  time_estimate_breakdown:
    - Schema Changes: 2h
    - Migration: 2h
    - API Routes: 2h
    - Tests: 1h
    - Documentation: 1h
    - Total: 8h

  status: COMPLETED
  created_at: 2026-02-07
  created_by: "@aios-master"
