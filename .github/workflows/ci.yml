name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  ci-quality-gates-v4:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kaven_test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      NODE_ENV: test

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kaven_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep postgresql-client

      - name: Wait for Database
        run: |
          echo "Waiting for PostgreSQL..."
          count=0
          until pg_isready -h localhost -U postgres -d kaven_test || [ $count -eq 30 ]; do
            sleep 2
            count=$((count + 1))
          done
          if [ $count -eq 30 ]; then echo "❌ DB Timeout" && exit 1; fi
          echo "✅ Database is ready!"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: |
          pnpm run db:generate
          rm -rf .turbo

      - name: Run migrations
        run: npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma

      - name: Lint
        run: pnpm run lint

      - name: Policy Checks
        run: |
          pnpm run policy:design-system
          # pnpm run policy:design-system-docs
          pnpm run check:ui-migration-clean

      - name: Typecheck
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: pnpm run typecheck

      - name: Test
        env:
          REDIS_URL: redis://localhost:6379
        run: pnpm run test

      - name: Security Tests
        env:
          REDIS_URL: redis://localhost:6379
        run: pnpm test:security
        working-directory: apps/api

      - name: Build All
        run: pnpm turbo build --filter=@kaven/* --filter=api --filter=admin --filter=tenant --filter=docs
        continue-on-error: true
